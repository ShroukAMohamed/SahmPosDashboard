<header class="flex items-center justify-between border-b border-border-dark px-4 md:px-6 py-4 bg-surface shrink-0 relative">
  <div class="flex items-center gap-4 md:gap-8">
    
    <!-- Mobile Hamburger Menu Button -->
    <button class="md:hidden flex items-center justify-center p-1 text-text-muted hover:text-white transition-colors cursor-pointer border-none bg-transparent"
            (click)="isMenuOpen.update(v => !v)">
      <span class="material-symbols-outlined text-[1.5rem]">{{ isMenuOpen() ? 'close' : 'menu' }}</span>
    </button>
    
    <!-- Logo -->
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-primary rounded flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-black font-bold">restaurant</span>
      </div>
      <span class="text-lg font-bold tracking-tight text-white hidden sm:block">Sahm <span class="text-text-muted font-medium">Dark Ops</span></span>
    </div>
    
    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-6">
      <a routerLink="/live-orders" 
         routerLinkActive="!text-primary !font-bold after:absolute after:-bottom-[21px] after:left-0 after:right-0 after:h-1 after:bg-primary after:rounded-t-full" 
         [routerLinkActiveOptions]="{exact: false}"
         class="relative text-sm font-medium text-text-muted hover:text-white transition-colors cursor-pointer no-underline">
        Live Orders
      </a>
      <a routerLink="/kitchen-monitor" 
         routerLinkActive="!text-primary !font-bold after:absolute after:-bottom-[21px] after:left-0 after:right-0 after:h-1 after:bg-primary after:rounded-t-full"
         class="relative text-sm font-medium text-text-muted hover:text-white transition-colors cursor-pointer no-underline">
        Kitchen Monitor
      </a>
      <a routerLink="/new-order" 
         routerLinkActive="!text-primary !font-bold after:absolute after:-bottom-[21px] after:left-0 after:right-0 after:h-1 after:bg-primary after:rounded-t-full"
         class="relative text-sm font-medium text-text-muted hover:text-white transition-colors cursor-pointer no-underline">
        New Order
      </a>
    </nav>
  </div>
  
  <div class="flex items-center gap-2 sm:gap-4 text-sm font-medium">
    <div class="hidden sm:flex items-center gap-2 text-text-muted">
      <span class="material-symbols-outlined text-[20px]">schedule</span>
      <span>{{ currentTime }}</span>
    </div>
    <app-sync-indicator [isSynced]="networkService.isOnline()"></app-sync-indicator>
  </div>

  <!-- Mobile Dropdown Menu -->
  @if (isMenuOpen()) {
    <div class="absolute top-full left-0 right-0 bg-surface border-b border-border-dark flex flex-col md:hidden z-50 shadow-xl overflow-hidden animate-fade-in">
      <a routerLink="/live-orders" 
         routerLinkActive="bg-surface-hover text-primary border-l-4 border-primary" 
         [routerLinkActiveOptions]="{exact: false}"
         (click)="isMenuOpen.set(false)"
         class="px-6 py-4 text-sm font-medium text-text-muted hover:text-white hover:bg-surface-hover transition-colors border-l-4 border-transparent flex items-center gap-3 no-underline">
        <span class="material-symbols-outlined text-[1.25rem]">view_kanban</span>
        Live Orders
      </a>
      <a routerLink="/kitchen-monitor" 
         routerLinkActive="bg-surface-hover text-primary border-l-4 border-primary"
         (click)="isMenuOpen.set(false)"
         class="px-6 py-4 text-sm font-medium text-text-muted hover:text-white hover:bg-surface-hover transition-colors border-l-4 border-transparent flex items-center gap-3 no-underline">
        <span class="material-symbols-outlined text-[1.25rem]">monitor</span>
        Kitchen Monitor
      </a>
      <a routerLink="/new-order" 
         routerLinkActive="bg-surface-hover text-primary border-l-4 border-primary"
         (click)="isMenuOpen.set(false)"
         class="px-6 py-4 text-sm font-medium text-text-muted hover:text-white hover:bg-surface-hover transition-colors border-l-4 border-transparent flex items-center gap-3 no-underline">
        <span class="material-symbols-outlined text-[1.25rem]">add_circle</span>
        New Order
      </a>
    </div>
  }
</header>
