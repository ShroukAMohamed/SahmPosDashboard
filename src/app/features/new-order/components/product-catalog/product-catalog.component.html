<section class="flex-1 flex flex-col bg-background overflow-hidden relative h-full">
  <!-- Search Bar -->
  <div class="p-6 pb-4 shrink-0 relative z-20">
    <div class="w-full h-12">
      <app-search-input placeholder="Search products, IDs, or shortcodes..." localStorageKey="newOrderRecentSearches"
        (search)="onSearch($event)">
      </app-search-input>
    </div>
  </div>

  <!-- Product Grid -->
  <div class="flex-1 overflow-y-auto p-6 pt-0 relative z-10 kanban-scroll">
    <div class="grid grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4">
      @if (store.isLoading()) {
      <!-- Skeleton Loading State -->
      @for (i of [1,2,3,4,5,6]; track i) {
      <div class="bg-surface border border-border-dark rounded-xl p-3 flex flex-col gap-3">
        <p-skeleton width="100%" height="160px" styleClass="rounded-lg bg-surface-hover"></p-skeleton>
        <div>
          <p-skeleton width="70%" height="1.25rem" styleClass="mb-2 bg-surface-hover"></p-skeleton>
          <p-skeleton width="100%" height="1rem" styleClass="bg-surface-hover"></p-skeleton>
        </div>
        <div class="flex justify-between items-center mt-auto">
          <p-skeleton width="40%" height="1.5rem" styleClass="bg-surface-hover"></p-skeleton>
          <p-skeleton shape="circle" size="2.5rem" styleClass="bg-surface-hover"></p-skeleton>
        </div>
      </div>
      }
      } @else if (store.error()) {
      <!-- Error State -->
      <div class="col-span-full flex flex-col items-center justify-center py-12 text-danger">
        <span class="material-symbols-outlined text-4xl mb-2 opacity-80">error</span>
        <p class="font-semibold">{{ store.error() }}</p>
        <button class="mt-4 px-4 py-2 bg-surface-hover hover:bg-border-dark text-white rounded-md transition-colors"
          (click)="store.loadProducts()">
          Try Again
        </button>
      </div>
      } @else {
      @for (product of store.filteredProducts(); track product.id) {
      <app-product-card [product]="product" (add)="store.addToCart($event)">
      </app-product-card>
      }

      @if (store.filteredProducts().length === 0) {
      <div class="col-span-full flex flex-col items-center justify-center py-12 text-text-muted">
        <span class="material-symbols-outlined text-4xl mb-2 opacity-50">search_off</span>
        <p>No products found matching your search.</p>
      </div>
      }
      }
    </div>
  </div>
</section>
