<aside class="w-full lg:w-1/5 lg:min-w-[200px] lg:border-r border-b lg:border-b-0 border-border-dark bg-background flex flex-row lg:flex-col overflow-x-auto lg:overflow-y-auto lg:overflow-x-hidden p-4 gap-2 lg:h-full shrink-0">
  <h2 class="hidden lg:block text-xs uppercase font-semibold text-text-muted tracking-wider mb-2 px-3">Categories</h2>
  
  @for (category of store.categories(); track category.id) {
    <button 
      (click)="store.setActiveCategory(category.id)"
      class="relative flex items-center justify-between px-4 lg:px-3 py-2 lg:py-3 rounded-full lg:rounded-md text-sm font-medium transition-colors cursor-pointer overflow-hidden shrink-0"
      [ngClass]="{
        'bg-primary text-black lg:bg-surface lg:text-white lg:before:absolute lg:before:left-0 lg:before:top-0 lg:before:bottom-0 lg:before:w-1 lg:before:bg-primary lg:before:content-[\'\']': store.activeCategoryId() === category.id,
        'bg-surface lg:bg-transparent hover:bg-surface-hover text-text-muted hover:text-white': store.activeCategoryId() !== category.id
      }">
      <span class="whitespace-nowrap">{{ category.name }}</span>
      <span class="hidden lg:inline bg-surface-hover text-xs px-2 py-0.5 rounded-full text-text-muted">{{ category.count }}</span>
    </button>
  }
</aside>
