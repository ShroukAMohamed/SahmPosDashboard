<div class="h-full flex flex-col w-full overflow-hidden bg-background">
  <!-- Page Header -->
  <div
    class="flex flex-wrap justify-between items-end gap-3 p-6 pb-4 border-b border-border-dark bg-background shrink-0">
    <div class="flex min-w-72 flex-col gap-1">
      <h1 class="text-white tracking-tight text-2xl font-bold leading-tight m-0">Kitchen Workload Monitor</h1>
      <p class="text-text-muted text-sm font-normal leading-normal m-0">Real-time station capacity and alerts</p>
    </div>
  </div>

  <!-- Main Dashboard Content -->
  <main class="flex-1 overflow-y-auto p-6">
    <div class="mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Left Column: Station Cards & Timeline (Spans 2 columns on lg screens) -->
      <div class="lg:col-span-2 flex flex-col gap-6">

        <!-- Station Capacity Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          @for (station of store.stations(); track station.id) {
          <app-station-capacity [station]="station"></app-station-capacity>
          }
        </div>

        <!-- Timeline Activity Chart / AI Insights -->
        <app-ai-insights-grid [insights]="store.insights()"></app-ai-insights-grid>

      </div>

      <!-- Right Column: Active Alerts -->
      <div class="lg:col-span-1 h-full">
        <app-active-alerts [alerts]="store.alerts()" [count]="store.activeAlertsCount()"
          (acknowledge)="store.acknowledgeAlert($event)">
        </app-active-alerts>
      </div>

    </div>
  </main>
</div>
