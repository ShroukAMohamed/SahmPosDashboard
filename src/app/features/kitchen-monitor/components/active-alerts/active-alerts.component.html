<div class="flex flex-col gap-4 bg-surface border border-border-dark rounded-md p-5 h-full overflow-hidden">
  <h3 class="text-base font-semibold border-b border-border-dark pb-3 flex items-center gap-2 m-0 text-white">
    <span class="material-symbols-outlined text-danger text-[20px]">notifications_active</span> Active Alerts
    <span class="ml-auto bg-danger/20 text-danger text-xs px-2 py-0.5 rounded-full font-bold">{{ count() }}</span>
  </h3>
  
  <div class="flex-1 overflow-y-auto scrollbar-hide flex flex-col gap-3 pt-2">
    @for (alert of alerts(); track alert.id) {
      <div 
        class="bg-surface-hover border-l-4 rounded-r-md p-3 flex flex-col gap-1 border-t border-r border-b border-border-dark"
        [ngClass]="{
          'border-l-danger animate-pulse': alert.type === 'danger' && !alert.acknowledged,
          'border-l-primary animate-pulse': alert.type === 'primary' && !alert.acknowledged,
          'border-l-success': alert.type === 'success' || alert.acknowledged,
          'opacity-60': alert.acknowledged || alert.type === 'success'
        }">
        
        <div class="flex justify-between items-start">
          <span class="text-sm font-semibold"
                [ngClass]="{
                  'text-danger': alert.type === 'danger',
                  'text-primary': alert.type === 'primary',
                  'text-success': alert.type === 'success'
                }">
            {{ alert.title }}
          </span>
          <span class="text-xs text-text-muted">{{ alert.timeAgo }}</span>
        </div>
        
        <p class="text-xs text-text-muted m-0 leading-relaxed">{{ alert.description }}</p>
        
        <div class="mt-2 flex gap-2">
          @if (alert.orderId) {
            <button class="text-xs bg-surface border border-border-dark px-2 py-1 rounded text-text-muted hover:text-white hover:border-text-muted transition-colors flex items-center gap-1 cursor-pointer">
              <span class="material-symbols-outlined text-[14px]">open_in_new</span>Order #{{ alert.orderId }}
            </button>
          }
          @if (!alert.acknowledged && alert.type !== 'success') {
            <button 
              class="text-xs bg-surface border border-border-dark px-2 py-1 rounded text-text-muted hover:text-white hover:border-text-muted transition-colors cursor-pointer"
              (click)="onAcknowledge(alert.id)">
              Acknowledge
            </button>
          }
        </div>
      </div>
    }
  </div>
</div>
