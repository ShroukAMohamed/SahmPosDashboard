<div class="relative group w-full h-full">
  <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[1.25rem] group-focus-within:text-primary transition-colors">search</span>
  <input 
    type="text" 
    [formControl]="searchControl"
    (focus)="onFocus()"
    (blur)="showRecentSearches.set(false)"
    (keydown)="onKeyDown($event)"
    [placeholder]="placeholder()" 
    class="w-full h-full bg-surface border border-border-dark rounded-md py-2 pl-10 pr-12 text-sm text-white placeholder:text-text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
  >
  <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-1 px-1.5 py-0.5 rounded bg-surface-hover border border-border-dark pointer-events-none">
    <span class="text-[0.625rem] text-text-muted font-bold font-mono">⌘</span>
    <span class="text-[0.625rem] text-text-muted font-bold font-mono">K</span>
  </div>

  <!-- Recent Searches Dropdown -->
  @if (showRecentSearches() && recentSearches().length > 0) {
    <div class="absolute z-50 w-full mt-1 bg-surface border border-border-dark rounded-md shadow-xl max-h-60 overflow-y-auto" (mousedown)="$event.preventDefault()">
      <div class="px-3 py-2 text-xs font-semibold text-text-muted uppercase tracking-wider flex justify-between items-center">
        Recent Searches
        <button class="hover:text-white transition-colors cursor-pointer" (click)="clearRecentSearches()">Clear</button>
      </div>
      <ul class="py-1 m-0 p-0 list-none">
        @for (search of recentSearches(); track search; let idx = $index) {
          <li 
            class="px-3 py-2 text-sm text-white hover:bg-surface-hover cursor-pointer flex items-center gap-2"
            [class.bg-surface-hover]="idx === focusedIndex()"
            (click)="selectRecentSearch(search)"
            (mouseenter)="focusedIndex.set(idx)">
            <span class="material-symbols-outlined text-text-muted text-[16px]">history</span>
            {{ search }}
          </li>
        }
      </ul>
    </div>
  }
</div>
