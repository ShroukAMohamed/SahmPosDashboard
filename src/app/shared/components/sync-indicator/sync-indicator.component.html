<div class="flex items-center gap-2 px-3 py-1.5 rounded-md bg-surface border border-border-dark">
  <div 
    class="w-2 h-2 rounded-full"
    [ngClass]="{
      'bg-success animate-pulse': isSynced,
      'bg-danger': !isSynced
    }">
  </div>
  <span class="text-white text-sm font-semibold">
    {{ isSynced ? 'Synced' : 'Offline' }}
  </span>
</div>
