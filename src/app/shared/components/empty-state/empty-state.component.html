<div class="flex flex-col items-center justify-center p-8 text-center h-full min-h-[20rem]">
    <!-- Icon Container -->
    <div class="flex items-center justify-center w-16 h-16 mb-4 rounded-full" 
         style="background-color: var(--color-surface-hover);">
        <i [class]="icon" style="font-size: 2rem; color: var(--color-text-muted);"></i>
    </div>
    
    <!-- Text Content -->
    <h3 class="mb-2" style="color: var(--color-text);">{{ title }}</h3>
    <p class="text-muted max-w-[20rem]">{{ message }}</p>

    <!-- Action Slot (Optional Button) -->
    <div class="mt-6">
        <ng-content></ng-content>
    </div>
</div>
